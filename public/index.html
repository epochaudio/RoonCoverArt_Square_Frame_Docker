    <style>
      :root {
        --z-background: 1;
        --z-content: 2;
        --z-overlay: 3;
        --z-image-front: 2;
        --z-image-back: 1;
        --wall-padding: 20px;
        --grid-gap: 20px;
        --transition-duration: 0.5s;
        --transition-easing: ease;
        --scale-down: 0.95;
        --scale-up: 1.05;
      }

      * {
        cursor: none !important;
        user-select: none !important;
        -webkit-user-select: none !important;
      }

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0a0a0a;
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      /* 隐藏所有默认的浏览器UI元素 */
      ::-webkit-scrollbar {
        display: none;
      }


      /* 共享布局样式 */
      .fullscreen-container,
      .grid-container,
      #pairDisabled {
        position: fixed;
        inset: 0;
        z-index: var(--z-content);
        isolation: isolate;
        contain: layout style paint;
      }

      /* 播放状态容器 */
      .fullscreen-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      .fullscreen-container.hidden,
      .grid-container.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .shared-image-styles {
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
        transition: opacity var(--transition-duration) var(--transition-easing), filter var(--transition-duration) var(--transition-easing);
        will-change: opacity;
        transform: translateZ(0);
      }

      #coverImage {
        max-width: 100vw;
        max-height: 100vh;
      }

      #coverImage.dimming {
        filter: brightness(0);
      }

      #coverImage.hidden {
        opacity: 0;
      }

      #coverImage.brightening {
        filter: brightness(1);
        transition: filter var(--transition-duration) var(--transition-easing);
      }

      /* 网格显示相关样式 */
      .grid-container {
        display: grid;
        grid-template: repeat(4, 1fr) / repeat(4, 1fr);
        gap: var(--grid-gap);
        padding: var(--wall-padding);
        box-sizing: border-box;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      .grid-item {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 0;
        background-color: transparent;
        contain: layout style paint;
      }

      .grid-item .flipper {
        position: relative;
        width: 100%;
        height: 100%;
      }

      .grid-item img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 0;
        transition: opacity var(--transition-duration) var(--transition-easing);
        opacity: 1;
        will-change: opacity;
        transform: translateZ(0);
      }

      .grid-item .front {
        z-index: var(--z-image-front);
      }

      .grid-item .back {
        opacity: 0;
      }

      .grid-item.flip .front {
        opacity: 0;
      }

      .grid-item.flip .back {
        opacity: 1;
      }

      /* 等待授权提示 */
      #pairDisabled {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.9);
        color: white;
        z-index: var(--z-overlay);
      }

      #pairDisabled .messages {
        text-align: center;
        padding: 20px;
      }

      #pairDisabled h2 {
        margin-bottom: 1em;
      }

      #pairDisabled p {
        margin: 0.5em 0;
        opacity: 0.8;
      }

      /* 添加新的 CSS 样式 */
      .cover-image {
        position: absolute;
        max-width: 100vw;
        max-height: 100vh;
      }

      #nextCoverImage {
        visibility: hidden;
        z-index: var(--z-image-back);
      }
    </style>
  </head>
